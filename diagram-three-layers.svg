<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Space Grotesk','Trebuchet MS',Arial,sans-serif">
  <defs>
    <marker id="arrDown" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5bc4d4"/>
    </marker>
    <marker id="arrUp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff6b35"/>
    </marker>
  </defs>

  <rect width="800" height="450" rx="12" fill="#120d0c"/>
  <rect x="0.5" y="0.5" width="799" height="449" rx="12" fill="none" stroke="#33221d"/>

  <!-- Layer 1 -->
  <rect x="170" y="38" width="460" height="95" rx="10" fill="#1a1210" stroke="#33221d"/>
  <rect x="170" y="48" width="5" height="75" fill="#3a6ea5"/>
  <text x="196" y="72" font-family="'JetBrains Mono','Courier New',monospace" font-size="13" letter-spacing="2" fill="#9b8a82">01 · EARTH</text>
  <text x="196" y="99" font-size="21" font-weight="bold" fill="#e8ddd6">Earth Command Layer</text>
  <text x="196" y="121" font-size="13" fill="#9b8a82">objectives · constraints · batch review — no piloting</text>

  <!-- gap 1 connector -->
  <line x1="400" y1="133" x2="400" y2="178" stroke="#4a3830" stroke-width="1.5" stroke-dasharray="3 6"/>
  <text x="418" y="160" font-family="'JetBrains Mono','Courier New',monospace" font-size="12" letter-spacing="1" fill="#9b8a82">4–24 min light-time</text>

  <!-- Layer 2 -->
  <rect x="170" y="178" width="460" height="95" rx="10" fill="#1a1210" stroke="#33221d"/>
  <rect x="170" y="188" width="5" height="75" fill="#5bc4d4"/>
  <text x="196" y="212" font-family="'JetBrains Mono','Courier New',monospace" font-size="13" letter-spacing="2" fill="#9b8a82">02 · DEEP SPACE LINK</text>
  <text x="196" y="239" font-size="21" font-weight="bold" fill="#e8ddd6">Relay &amp; Scheduling Layer</text>
  <text x="196" y="261" font-size="13" fill="#9b8a82">command queueing · DSN link · bandwidth windows</text>

  <!-- gap 2 connector -->
  <line x1="400" y1="273" x2="400" y2="318" stroke="#4a3830" stroke-width="1.5" stroke-dasharray="3 6"/>
  <text x="418" y="300" font-family="'JetBrains Mono','Courier New',monospace" font-size="12" letter-spacing="1" fill="#9b8a82">4–24 min light-time</text>

  <!-- Layer 3 -->
  <rect x="170" y="318" width="460" height="95" rx="10" fill="#1a1210" stroke="#33221d"/>
  <rect x="170" y="328" width="5" height="75" fill="#ff6b35"/>
  <text x="196" y="352" font-family="'JetBrains Mono','Courier New',monospace" font-size="13" letter-spacing="2" fill="#9b8a82">03 · ON MARS</text>
  <text x="196" y="379" font-size="21" font-weight="bold" fill="#e8ddd6">Avatar Autonomy Layer</text>
  <text x="196" y="401" font-size="13" fill="#9b8a82">navigation · manipulation · hazard response — in seconds, locally</text>

  <!-- intent arrow (down, left side) -->
  <line x1="112" y1="80" x2="112" y2="368" stroke="#5bc4d4" stroke-width="2" stroke-dasharray="6 8" marker-end="url(#arrDown)"/>
  <text x="94" y="226" font-family="'JetBrains Mono','Courier New',monospace" font-size="13" letter-spacing="4" fill="#5bc4d4" text-anchor="middle" transform="rotate(-90 94 226)">INTENT</text>

  <!-- telemetry arrow (up, right side) -->
  <line x1="688" y1="368" x2="688" y2="80" stroke="#ff6b35" stroke-width="2" stroke-dasharray="6 8" marker-end="url(#arrUp)"/>
  <text x="708" y="226" font-family="'JetBrains Mono','Courier New',monospace" font-size="13" letter-spacing="4" fill="#ff6b35" text-anchor="middle" transform="rotate(90 708 226)">TELEMETRY</text>
</svg>
