<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Menlo, Consolas, monospace">
  <rect width="800" height="600" fill="#0b1220"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" fill="#ff6b35" font-size="13" letter-spacing="3">SYSTEM ARCHITECTURE</text>
  <text x="400" y="76" text-anchor="middle" fill="#eef1f5" font-size="22" font-weight="bold" letter-spacing="1">Three-Layer Control Model</text>

  <!-- Layer 1: Earth Command -->
  <g>
    <rect x="120" y="110" width="560" height="110" rx="10" fill="#0e1526" stroke="#3a6ea5" stroke-width="2"/>
    <text x="150" y="140" fill="#3a6ea5" font-size="11" letter-spacing="2">LAYER 01</text>
    <text x="150" y="166" fill="#eef1f5" font-size="17" font-weight="bold">Earth Command Layer</text>
    <text x="150" y="192" fill="#9aa7b8" font-size="12">Objectives · Constraints · Safety envelopes · Batch review</text>
    <text x="628" y="172" text-anchor="end" fill="#3a6ea5" font-size="26">⌂</text>
  </g>

  <!-- Arrow down 1 -->
  <line x1="400" y1="220" x2="400" y2="252" stroke="#ff6b35" stroke-width="2"/>
  <polygon points="400,258 394,246 406,246" fill="#ff6b35"/>
  <text x="418" y="243" fill="#5f6b7d" font-size="10">INTENT ↓</text>

  <!-- Layer 2: Relay -->
  <g>
    <rect x="120" y="262" width="560" height="110" rx="10" fill="#0e1526" stroke="#9aa7b8" stroke-width="2"/>
    <text x="150" y="292" fill="#9aa7b8" font-size="11" letter-spacing="2">LAYER 02</text>
    <text x="150" y="318" fill="#eef1f5" font-size="17" font-weight="bold">Relay &amp; Scheduling Layer</text>
    <text x="150" y="344" fill="#9aa7b8" font-size="12">Queue · Prioritize · Transmit across Deep Space Network windows</text>
    <text x="628" y="324" text-anchor="end" fill="#9aa7b8" font-size="26">⇅</text>
  </g>

  <!-- Arrow down 2 -->
  <line x1="400" y1="372" x2="400" y2="404" stroke="#ff6b35" stroke-width="2"/>
  <polygon points="400,410 394,398 406,398" fill="#ff6b35"/>
  <text x="418" y="395" fill="#5f6b7d" font-size="10">COMMANDS ↓</text>

  <!-- Layer 3: Avatar Autonomy -->
  <g>
    <rect x="120" y="414" width="560" height="110" rx="10" fill="#0e1526" stroke="#c1440e" stroke-width="2"/>
    <text x="150" y="444" fill="#ff6b35" font-size="11" letter-spacing="2">LAYER 03</text>
    <text x="150" y="470" fill="#eef1f5" font-size="17" font-weight="bold">Avatar Autonomy Layer</text>
    <text x="150" y="496" fill="#9aa7b8" font-size="12">Navigation · Manipulation · Hazard response — no waiting for Earth</text>
    <text x="628" y="476" text-anchor="end" fill="#ff6b35" font-size="26">⚙</text>
  </g>

  <!-- Telemetry return line on the right -->
  <path d="M700 469 L740 469 L740 165 L700 165" stroke="#3a6ea5" stroke-width="1.5" fill="none" stroke-dasharray="4 5"/>
  <polygon points="700,165 711,160 711,171" fill="#3a6ea5"/>
  <text x="752" y="322" fill="#3a6ea5" font-size="10" transform="rotate(90 752 322)" text-anchor="middle">TELEMETRY</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#5f6b7d" font-size="10" letter-spacing="2">MARS AVATAR PROJECT · FIG. 2</text>
</svg>
