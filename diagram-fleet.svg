<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Menlo, Consolas, monospace">
  <rect width="800" height="600" fill="#0b1220"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" fill="#ff6b35" font-size="13" letter-spacing="3">HARDWARE CONCEPT</text>
  <text x="400" y="76" text-anchor="middle" fill="#eef1f5" font-size="22" font-weight="bold" letter-spacing="1">Robotic Avatar Fleet</text>

  <!-- Mars ground -->
  <path d="M0 470 Q200 440 400 462 Q600 484 800 452 L800 600 L0 600 Z" fill="#2a1006"/>
  <path d="M0 470 Q200 440 400 462 Q600 484 800 452" stroke="#c1440e" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Orbital relay above -->
  <g>
    <rect x="374" y="112" width="52" height="30" rx="4" fill="#0e1526" stroke="#3a6ea5" stroke-width="2"/>
    <rect x="338" y="119" width="30" height="16" rx="2" fill="#13294b" stroke="#3a6ea5" stroke-width="1.5"/>
    <rect x="432" y="119" width="30" height="16" rx="2" fill="#13294b" stroke="#3a6ea5" stroke-width="1.5"/>
    <text x="400" y="98" text-anchor="middle" fill="#9aa7b8" font-size="11">TO ORBITAL RELAY / EARTH</text>
  </g>

  <!-- Relay Unit (center, elevated mast) -->
  <g>
    <line x1="400" y1="452" x2="400" y2="330" stroke="#9aa7b8" stroke-width="3"/>
    <rect x="384" y="306" width="32" height="26" rx="3" fill="#0e1526" stroke="#9aa7b8" stroke-width="2"/>
    <path d="M384 306 L376 292 M416 306 L424 292" stroke="#9aa7b8" stroke-width="2"/>
    <rect x="378" y="440" width="44" height="16" rx="3" fill="#0e1526" stroke="#9aa7b8" stroke-width="2"/>
    <text x="400" y="490" text-anchor="middle" fill="#eef1f5" font-size="13" font-weight="bold">RELAY UNIT</text>
    <text x="400" y="508" text-anchor="middle" fill="#9aa7b8" font-size="10">Local comms hub</text>
  </g>

  <!-- Uplink from relay unit to satellite -->
  <line x1="400" y1="300" x2="400" y2="150" stroke="#3a6ea5" stroke-width="1.5" stroke-dasharray="5 6"/>
  <polygon points="400,150 395,161 405,161" fill="#3a6ea5"/>

  <!-- Survey Unit (left, rover with wheels) -->
  <g>
    <rect x="120" y="398" width="80" height="34" rx="6" fill="#0e1526" stroke="#c1440e" stroke-width="2"/>
    <circle cx="136" cy="440" r="11" fill="#0b1220" stroke="#c1440e" stroke-width="2"/>
    <circle cx="160" cy="440" r="11" fill="#0b1220" stroke="#c1440e" stroke-width="2"/>
    <circle cx="184" cy="440" r="11" fill="#0b1220" stroke="#c1440e" stroke-width="2"/>
    <line x1="150" y1="398" x2="150" y2="378" stroke="#c1440e" stroke-width="2"/>
    <circle cx="150" cy="372" r="6" fill="#0e1526" stroke="#c1440e" stroke-width="2"/>
    <text x="160" y="490" text-anchor="middle" fill="#eef1f5" font-size="13" font-weight="bold">SURVEY UNIT</text>
    <text x="160" y="508" text-anchor="middle" fill="#9aa7b8" font-size="10">Terrain mapping</text>
  </g>

  <!-- Manipulator Unit (right, arm) -->
  <g>
    <rect x="590" y="404" width="70" height="30" rx="6" fill="#0e1526" stroke="#c1440e" stroke-width="2"/>
    <circle cx="606" cy="442" r="10" fill="#0b1220" stroke="#c1440e" stroke-width="2"/>
    <circle cx="644" cy="442" r="10" fill="#0b1220" stroke="#c1440e" stroke-width="2"/>
    <path d="M625 404 L640 368 L672 352" stroke="#ff6b35" stroke-width="3" fill="none"/>
    <circle cx="640" cy="368" r="4" fill="#ff6b35"/>
    <path d="M672 352 L684 344 M672 352 L682 362" stroke="#ff6b35" stroke-width="2.5"/>
    <text x="628" y="490" text-anchor="middle" fill="#eef1f5" font-size="13" font-weight="bold">MANIPULATOR UNIT</text>
    <text x="628" y="508" text-anchor="middle" fill="#9aa7b8" font-size="10">Sampling · Drilling</text>
  </g>

  <!-- Local mesh links -->
  <path d="M205 400 Q300 348 382 330" stroke="#ff6b35" stroke-width="1.5" fill="none" stroke-dasharray="4 5"/>
  <path d="M418 330 Q510 352 592 398" stroke="#ff6b35" stroke-width="1.5" fill="none" stroke-dasharray="4 5"/>
  <text x="290" y="342" text-anchor="middle" fill="#ff6b35" font-size="9">LOCAL MESH</text>
  <text x="512" y="346" text-anchor="middle" fill="#ff6b35" font-size="9">LOCAL MESH</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#5f6b7d" font-size="10" letter-spacing="2">MARS AVATAR PROJECT · FIG. 3</text>
</svg>
