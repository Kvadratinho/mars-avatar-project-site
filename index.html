<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mars Avatar Project</title>

<style>
/* Современные стили для профессионального вида сайта Mars Avatar Project */

/* Цвета и переменные (удобно менять в будущем) */
:root {
    --accent-color: #b22222;
    --accent-hover: #8b0000;
    --bg-color: #111111;
    --text-color: #ffffff;
}

/* Основные стили страницы */
body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    padding: 0;
    line-height: 1.7;
    text-align: center;
}

/* Шапка сайта */
header {
    background: linear-gradient(135deg, #8b0000 0%, #b22222 100%);
    padding: 60px 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

h1 {
    margin: 0;
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: -1px;
}

header p {
    font-size: 1.3rem;
    margin: 15px 0 0;
    opacity: 0.95;
    font-weight: 500;
}

/* Основной раздел */
section {
    padding: 60px 20px;
    max-width: 850px;
    margin: 0 auto;
}

h2 {
    color: #ffb347;
    font-size: 2rem;
    margin-bottom: 25px;
    font-weight: 600;
}

/* Текст описания (лучше читается) */
p {
    font-size: 1.1rem;
    max-width: 700px;
    margin: 0 auto 30px;
    text-align: left;
}

/* Контейнер для кнопок (современный и удобный на телефонах) */
.buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

/* Стиль кнопок */
.button {
    display: inline-block;
    padding: 14px 28px;
    background-color: var(--accent-color);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 1rem;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(178, 34, 34, 0.3);
}

/* Эффект при наведении мыши */
.button:hover {
    background-color: var(--accent-hover);
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
}

/* Подвал */
footer {
    background-color: #222222;
    padding: 25px 20px;
    margin-top: 40px;
    font-size: 0.95rem;
    color: #aaaaaa;
}

/* Адаптивность для мобильных телефонов */
@media (max-width: 600px) {
    h1 {
        font-size: 2.2rem;
    }
    
    section {
        padding: 40px 15px;
    }
    
    .button {
        padding: 12px 24px;
        font-size: 0.95rem;
    }
}
</style>

</head>
<body>

<header>
<h1>Mars Avatar Project</h1>
<p><b>Control Without Presence</b></p>
</header>

<section>

<h2>About</h2>

<p>
Mars Avatar Project is a concept for autonomous robotic avatars
that can perform scientific and engineering tasks on Mars
under human supervision from Earth.
</p>

<div class="buttons">
<a class="button" href="https://github.com/Kvadratinho/mars-avatar-project">GitHub</a>
<a class="button" href="https://doi.org/">Zenodo</a>
</div>

</section>

<footer>

<p>Author: Oleksandr Khalanhot</p>

</footer>

</body>
</html>
