<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Space Grotesk','Trebuchet MS',Arial,sans-serif">
  <defs>
    <marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5bc4d4"/>
    </marker>
    <clipPath id="earthClip"><circle cx="130" cy="250" r="52"/></clipPath>
  </defs>

  <rect width="800" height="450" rx="12" fill="#120d0c"/>
  <rect x="0.5" y="0.5" width="799" height="449" rx="12" fill="none" stroke="#33221d"/>

  <!-- stars -->
  <g fill="#e8ddd6" opacity="0.4">
    <circle cx="70" cy="60" r="1.4"/><circle cx="210" cy="110" r="1"/><circle cx="320" cy="45" r="1.3"/>
    <circle cx="520" cy="70" r="1"/><circle cx="600" cy="330" r="1.2"/><circle cx="740" cy="120" r="1"/>
    <circle cx="460" cy="180" r="1"/><circle cx="90" cy="150" r="1"/><circle cx="700" cy="300" r="1.3"/>
    <circle cx="280" cy="330" r="1.1"/><circle cx="380" cy="380" r="1"/><circle cx="640" cy="50" r="1.1"/>
  </g>

  <!-- signal path -->
  <path d="M172,222 Q280,120 398,86" fill="none" stroke="#5bc4d4" stroke-width="2.5" stroke-dasharray="7 9" marker-end="url(#arrB)"/>
  <path d="M428,84 Q540,100 636,158" fill="none" stroke="#5bc4d4" stroke-width="2.5" stroke-dasharray="7 9" marker-end="url(#arrB)"/>

  <!-- Earth -->
  <circle cx="130" cy="250" r="52" fill="#3a6ea5"/>
  <g clip-path="url(#earthClip)">
    <circle cx="112" cy="232" r="46" fill="#5f97c9" opacity="0.55"/>
    <ellipse cx="150" cy="262" rx="24" ry="14" fill="#2c567f" opacity="0.8"/>
    <ellipse cx="108" cy="278" rx="16" ry="9" fill="#2c567f" opacity="0.7"/>
  </g>
  <text x="130" y="334" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="14" letter-spacing="4" fill="#9b8a82">EARTH</text>

  <!-- Orbital relay -->
  <g>
    <rect x="374" y="70" width="22" height="10" rx="2" fill="#3a6ea5"/>
    <rect x="404" y="70" width="22" height="10" rx="2" fill="#3a6ea5"/>
    <line x1="396" y1="75" x2="404" y2="75" stroke="#9b8a82" stroke-width="3"/>
    <rect x="392" y="66" width="16" height="18" rx="3" fill="#b9aca4"/>
    <circle cx="400" cy="60" r="4" fill="#ff6b35"/>
    <line x1="400" y1="64" x2="400" y2="66" stroke="#9b8a82" stroke-width="2"/>
  </g>
  <text x="410" y="44" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="12" letter-spacing="3" fill="#9b8a82">ORBITAL RELAY</text>

  <!-- Mars -->
  <circle cx="670" cy="185" r="38" fill="#c1440e"/>
  <circle cx="658" cy="174" r="9" fill="#ff6b35" opacity="0.45"/>
  <circle cx="684" cy="198" r="11" fill="#8b2f0a" opacity="0.6"/>
  <text x="670" y="255" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="14" letter-spacing="4" fill="#9b8a82">MARS</text>

  <!-- delay callout -->
  <text x="400" y="300" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="26" letter-spacing="4" fill="#ff6b35">4–24 MIN ONE-WAY</text>
  <text x="400" y="330" text-anchor="middle" font-size="14" letter-spacing="1" fill="#9b8a82">real-time joystick control is physically impossible</text>
  <line x1="250" y1="352" x2="550" y2="352" stroke="#33221d" stroke-width="1.5"/>
  <text x="400" y="382" text-anchor="middle" font-size="14" fill="#e8ddd6">a command sent now arrives in the future —</text>
  <text x="400" y="402" text-anchor="middle" font-size="14" fill="#e8ddd6">the picture on screen is already the past</text>
</svg>
